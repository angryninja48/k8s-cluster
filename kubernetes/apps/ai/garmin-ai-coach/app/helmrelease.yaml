---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app garmin-ai-coach
  namespace: ai
spec:
  chartRef:
    kind: OCIRepository
    name: garmin-ai-coach
    namespace: ai
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    controllers:
      backend:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "17.4"
            envFrom: &envFrom
              - secretRef:
                  name: garmin-ai-coach-secret
          migrate:
            image:
              repository: ghcr.io/angryninja48/garmin-ai-coach-backend
              tag: sha-12f5aa9
            command: ["alembic", "upgrade", "head"]
            envFrom: *envFrom
        containers:
          app:
            image:
              repository: ghcr.io/angryninja48/garmin-ai-coach-backend
              tag: sha-12f5aa9
            env:
              CELERY_BROKER_URL: redis://dragonfly.database.svc.cluster.local:6379/0
              CONFIG_PATH: /app/config/my_training_config.yaml
              CORS_ORIGINS: https://coach.bakerhaus.cloud
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 3Gi

      frontend:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/angryninja48/garmin-ai-coach-frontend
              tag: sha-12f5aa9
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi

      celery-worker:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/angryninja48/garmin-ai-coach-backend
              tag: sha-12f5aa9
            command:
              - celery
              - -A
              - app.tasks.celery_app.celery_app
              - worker
              - --loglevel=info
              - --concurrency=1
            env:
              CELERY_BROKER_URL: redis://dragonfly.database.svc.cluster.local:6379/0
              CONFIG_PATH: /app/config/my_training_config.yaml
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      backend:
        controller: backend
        ports:
          http:
            port: 8000
      frontend:
        controller: frontend
        ports:
          http:
            port: 80

    route:
      frontend:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/target: external.bakerhaus.cloud
          external-dns.home.arpa/enabled: "true"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - &host coach.bakerhaus.cloud
        rules:
          - backendRefs:
              - name: garmin-ai-coach-frontend
                port: 80
      backend-api:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - *host
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            backendRefs:
              - name: garmin-ai-coach-backend
                port: 8000

    persistence:
      output:
        existingClaim: garmin-ai-coach-output
        advancedMounts:
          backend:
            app:
              - path: /app/output
          celery-worker:
            app:
              - path: /app/output
      config:
        existingClaim: garmin-ai-coach
        advancedMounts:
          backend:
            app:
              - path: /app/config
                readOnly: true
          celery-worker:
            app:
              - path: /app/config
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          backend:
            app:
              - path: /tmp
          celery-worker:
            app:
              - path: /tmp
