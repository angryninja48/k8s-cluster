---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garmin-ai-coach
  namespace: ai
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-secrets
  target:
    name: garmin-ai-coach-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database init (consumed by postgres-init init container)
        INIT_POSTGRES_DBNAME: garmin_ai_coach
        INIT_POSTGRES_HOST: postgres17-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .GARMIN_AI_COACH_DB_USER }}"
        INIT_POSTGRES_PASS: "{{ .GARMIN_AI_COACH_DB_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .INIT_POSTGRES_SUPER_PASS }}"
        # Database connection (consumed by backend app)
        GARMIN_AI_COACH_DB_USER: "{{ .GARMIN_AI_COACH_DB_USER }}"
        GARMIN_AI_COACH_DB_PASS: "{{ .GARMIN_AI_COACH_DB_PASS }}"
        DATABASE_URL: "postgresql+asyncpg://{{ .GARMIN_AI_COACH_DB_USER }}:{{ .GARMIN_AI_COACH_DB_PASS }}@postgres17-rw.database.svc.cluster.local:5432/garmin_ai_coach"
        # App secrets
        GARMIN_FERNET_KEY: "{{ .GARMIN_AI_COACH_FERNET_KEY }}"
        JWT_SECRET_KEY: "{{ .GARMIN_AI_COACH_JWT_SECRET }}"
        ADMIN_EMAIL: "{{ .GARMIN_AI_COACH_ADMIN_EMAIL }}"
        ADMIN_PASSWORD: "{{ .GARMIN_AI_COACH_ADMIN_PASSWORD }}"
        # LLM API keys
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
  dataFrom:
    - find:
        path: GARMIN_AI_COACH_
    - find:
        path: INIT_POSTGRES_
    - find:
        path: ANTHROPIC_API_KEY
    - find:
        path: OPENAI_API_KEY
