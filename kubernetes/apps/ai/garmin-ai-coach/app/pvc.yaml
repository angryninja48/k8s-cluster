---
# Config PVC — stores my_training_config.yaml; RWX so backend+celery-worker mount from different nodes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garmin-ai-coach
  namespace: ai
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: ceph-filesystem
---
# Output PVC — stores AI-generated run artifacts, not backed up via volsync
# RWX so backend+celery-worker can mount from different nodes (talos01/talos03)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garmin-ai-coach-output
  namespace: ai
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: ceph-filesystem
