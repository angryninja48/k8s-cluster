---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/backendtlspolicy_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: unifi
  namespace: network
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: unifi
      sectionName: "http"
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: unifi-ca
    hostname: unifi
    subjectAltNames:
      - type: Hostname
        hostname: unifi
